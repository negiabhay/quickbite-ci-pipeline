name: QuickBite CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Download my code
        uses: actions/checkout@v4

      - name: Step 2 - Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Step 3 - Install dependencies
        run: pip install -r requirements.txt

      - name: Step 4 - Run the tests
        run: pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
     - name: Step 1 - Download code
       uses: actions/checkout@v4

     - name: Step 2 - Install python
       uses: actions/setup-python@v5
       with:
         python-version: '3.10'

     - name: Step 3 - Install Dependencies
       run: pip install -r requirements.txt

     - name: Step 4 - Package the app
       run: zip -r quickbite.zip app.py requirements.txt
        
